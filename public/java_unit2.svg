<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <text x="400" y="50" font-family="sans-serif" font-size="28" font-weight="bold" fill="#a855f7" text-anchor="middle">UNIT II</text>
  <text x="400" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f9fafc" text-anchor="middle">Classes, Objects &amp; Methods</text>
  
  <!-- Class Blueprint Card -->
  <rect x="40" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#a855f7" stroke-width="2" stroke-opacity="0.8"/>
  <text x="150" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Class Blueprint</text>
  <line x1="70" y1="170" x2="230" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="70" y="200" font-family="monospace" font-size="14" fill="#c084fc" font-weight="bold">class Student {</text>
  <text x="90" y="225" font-family="monospace" font-size="13" fill="#fbbf24">int rollNo;</text>
  <text x="90" y="245" font-family="monospace" font-size="13" fill="#fbbf24">String name;</text>
  <text x="90" y="275" font-family="monospace" font-size="13" fill="#38bdf8">void study() {</text>
  <text x="110" y="295" font-family="monospace" font-size="12" fill="#94a3b8">// behavior</text>
  <text x="90" y="315" font-family="monospace" font-size="13" fill="#38bdf8">}</text>
  <text x="70" y="335" font-family="monospace" font-size="14" fill="#c084fc" font-weight="bold">}</text>

  <!-- Object Instantiation Card -->
  <rect x="290" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#d946ef" stroke-width="2" stroke-opacity="0.8"/>
  <text x="400" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Object Allocation</text>
  <line x1="320" y1="170" x2="480" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="320" y="200" font-family="monospace" font-size="13" fill="#f472b6" font-weight="bold">Student s = new Student();</text>
  <text x="320" y="235" font-family="sans-serif" font-size="14" fill="#38bdf8" font-weight="bold">Stack Reference</text>
  <text x="320" y="255" font-family="sans-serif" font-size="12" fill="#94a3b8">s holds memory address</text>
  <text x="320" y="290" font-family="sans-serif" font-size="14" fill="#10b981" font-weight="bold">Heap Instance</text>
  <text x="320" y="310" font-family="sans-serif" font-size="12" fill="#94a3b8">new allocates memory</text>

  <!-- Methods Overloading Card -->
  <rect x="540" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#6366f1" stroke-width="2" stroke-opacity="0.8"/>
  <text x="650" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Method Features</text>
  <line x1="570" y1="170" x2="730" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="570" y="200" font-family="sans-serif" font-size="14" fill="#818cf8" font-weight="bold">Overloading</text>
  <text x="570" y="220" font-family="sans-serif" font-size="12" fill="#94a3b8">Same name, diff parameters</text>
  <text x="570" y="250" font-family="sans-serif" font-size="14" fill="#818cf8" font-weight="bold">Constructors</text>
  <text x="570" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Init object, same name as class</text>
  <text x="570" y="300" font-family="sans-serif" font-size="14" fill="#818cf8" font-weight="bold">Access Control</text>
  <text x="570" y="320" font-family="monospace" font-size="12" fill="#fbbf24">private, default, public</text>
</svg>
