<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <text x="400" y="50" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ec4899" text-anchor="middle">UNIT V</text>
  <text x="400" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f9fafc" text-anchor="middle">Strings, Multithreading &amp; JavaFX</text>
  
  <!-- Strings Card -->
  <rect x="40" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#db2777" stroke-width="2" stroke-opacity="0.8"/>
  <text x="150" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">String Handling</text>
  <line x1="70" y1="170" x2="230" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="70" y="200" font-family="sans-serif" font-size="14" fill="#f472b6" font-weight="bold">String (Immutable)</text>
  <text x="70" y="220" font-family="sans-serif" font-size="12" fill="#94a3b8">Stored in String Pool</text>
  <text x="70" y="250" font-family="sans-serif" font-size="14" fill="#f472b6" font-weight="bold">StringBuffer (Mutable)</text>
  <text x="70" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Thread-safe, synchronized</text>
  <text x="70" y="300" font-family="sans-serif" font-size="14" fill="#f472b6" font-weight="bold">StringBuilder</text>
  <text x="70" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Non-synchronized, faster</text>

  <!-- Multithreading Card -->
  <rect x="290" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#e11d48" stroke-width="2" stroke-opacity="0.8"/>
  <text x="400" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Multithreading</text>
  <line x1="320" y1="170" x2="480" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="320" y="200" font-family="sans-serif" font-size="14" fill="#fb7185" font-weight="bold">Creation Modes</text>
  <text x="320" y="220" font-family="sans-serif" font-size="12" fill="#94a3b8">Thread Class / Runnable interface</text>
  <text x="320" y="250" font-family="sans-serif" font-size="14" fill="#fb7185" font-weight="bold">States &amp; Priorities</text>
  <text x="320" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">New, Runnable, Running, Blocked</text>
  <text x="320" y="300" font-family="sans-serif" font-size="14" fill="#fb7185" font-weight="bold">Synchronization</text>
  <text x="320" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Prevent race conditions via locks</text>

  <!-- JavaFX Card -->
  <rect x="540" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#f43f5e" stroke-width="2" stroke-opacity="0.8"/>
  <text x="650" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">JavaFX GUI</text>
  <line x1="570" y1="170" x2="730" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="570" y="200" font-family="sans-serif" font-size="14" fill="#fda4af" font-weight="bold">Scene Graph</text>
  <text x="570" y="220" font-family="monospace" font-size="12" fill="#fbbf24">Stage -> Scene -> Nodes</text>
  <text x="570" y="250" font-family="sans-serif" font-size="14" fill="#fda4af" font-weight="bold">Layout Panes</text>
  <text x="570" y="270" font-family="monospace" font-size="12" fill="#38bdf8">HBox, VBox, GridPane</text>
  <text x="570" y="300" font-family="sans-serif" font-size="14" fill="#fda4af" font-weight="bold">Event Handling</text>
  <text x="570" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Action &amp; Mouse/Key events</text>
</svg>
