<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <text x="400" y="50" font-family="sans-serif" font-size="28" font-weight="bold" fill="#06b6d4" text-anchor="middle">UNIT I</text>
  <text x="400" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f9fafc" text-anchor="middle">OOP, Data Types &amp; Control Statements</text>
  
  <!-- OOP Principles Card -->
  <rect x="40" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.8"/>
  <text x="150" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">OOP Pillars</text>
  <line x1="70" y1="170" x2="230" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="70" y="200" font-family="sans-serif" font-size="14" fill="#38bdf8" font-weight="bold">Encapsulation</text>
  <text x="70" y="220" font-family="sans-serif" font-size="12" fill="#94a3b8">Data hiding via modifiers</text>
  <text x="70" y="250" font-family="sans-serif" font-size="14" fill="#38bdf8" font-weight="bold">Inheritance</text>
  <text x="70" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Code reusability (extends)</text>
  <text x="70" y="300" font-family="sans-serif" font-size="14" fill="#38bdf8" font-weight="bold">Polymorphism</text>
  <text x="70" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Overloading &amp; Overriding</text>

  <!-- Data Types Card -->
  <rect x="290" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#0ea5e9" stroke-width="2" stroke-opacity="0.8"/>
  <text x="400" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Data Types</text>
  <line x1="320" y1="170" x2="480" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="320" y="200" font-family="sans-serif" font-size="14" fill="#22d3ee" font-weight="bold">Primitive (8 types)</text>
  <text x="320" y="220" font-family="monospace" font-size="12" fill="#fbbf24">int, double, char, boolean</text>
  <text x="320" y="238" font-family="monospace" font-size="12" fill="#94a3b8">byte, short, long, float</text>
  <text x="320" y="275" font-family="sans-serif" font-size="14" fill="#22d3ee" font-weight="bold">Reference Types</text>
  <text x="320" y="295" font-family="sans-serif" font-size="12" fill="#94a3b8">Class Objects, Arrays,</text>
  <text x="320" y="315" font-family="sans-serif" font-size="12" fill="#94a3b8">and Interfaces</text>

  <!-- Control Flow Card -->
  <rect x="540" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#10b981" stroke-width="2" stroke-opacity="0.8"/>
  <text x="650" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Control Flow</text>
  <line x1="570" y1="170" x2="730" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="570" y="200" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold">Branching</text>
  <text x="570" y="220" font-family="monospace" font-size="12" fill="#fbbf24">if-else / switch</text>
  <text x="570" y="250" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold">Loops (Iteration)</text>
  <text x="570" y="270" font-family="monospace" font-size="12" fill="#fbbf24">for, while, do-while</text>
  <text x="570" y="300" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold">Jump Statements</text>
  <text x="570" y="320" font-family="monospace" font-size="12" fill="#fbbf24">break / continue / return</text>
</svg>
