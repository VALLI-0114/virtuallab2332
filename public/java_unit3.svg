<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <text x="400" y="50" font-family="sans-serif" font-size="28" font-weight="bold" fill="#14b8a6" text-anchor="middle">UNIT III</text>
  <text x="400" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f9fafc" text-anchor="middle">Arrays &amp; Inheritance</text>
  
  <!-- Arrays Card -->
  <rect x="40" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#0d9488" stroke-width="2" stroke-opacity="0.8"/>
  <text x="150" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Arrays in Java</text>
  <line x1="70" y1="170" x2="230" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="70" y="200" font-family="sans-serif" font-size="14" fill="#2dd4bf" font-weight="bold">1D Array</text>
  <text x="70" y="220" font-family="monospace" font-size="12" fill="#fbbf24">int[] a = new int[5]</text>
  <text x="70" y="250" font-family="sans-serif" font-size="14" fill="#2dd4bf" font-weight="bold">2D &amp; Jagged Arrays</text>
  <text x="70" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Arrays of different row sizes</text>
  <text x="70" y="300" font-family="sans-serif" font-size="14" fill="#2dd4bf" font-weight="bold">Arrays Helper Class</text>
  <text x="70" y="320" font-family="monospace" font-size="12" fill="#fbbf24">sort(), binarySearch()</text>

  <!-- Inheritance Card -->
  <rect x="290" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#10b981" stroke-width="2" stroke-opacity="0.8"/>
  <text x="400" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Inheritance Structure</text>
  <line x1="320" y1="170" x2="480" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="320" y="200" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold">Extending Classes</text>
  <text x="320" y="220" font-family="monospace" font-size="12" fill="#fbbf24">class B extends A {}</text>
  <text x="320" y="250" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold">Abstract Classes</text>
  <text x="320" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Cannot instantiate directly</text>
  <text x="320" y="300" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold">Object Class</text>
  <text x="320" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Root of all class structures</text>

  <!-- Interfaces Card -->
  <rect x="540" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.8"/>
  <text x="650" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Interfaces</text>
  <line x1="570" y1="170" x2="730" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="570" y="200" font-family="sans-serif" font-size="14" fill="#22d3ee" font-weight="bold">Multiple Interfaces</text>
  <text x="570" y="220" font-family="monospace" font-size="12" fill="#fbbf24">implements I1, I2</text>
  <text x="570" y="250" font-family="sans-serif" font-size="14" fill="#22d3ee" font-weight="bold">Default Methods</text>
  <text x="570" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Method body inside interface</text>
  <text x="570" y="300" font-family="sans-serif" font-size="14" fill="#22d3ee" font-weight="bold">Polymorphism</text>
  <text x="570" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Dynamic method dispatch</text>
</svg>
