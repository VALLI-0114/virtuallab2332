<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <text x="400" y="50" font-family="sans-serif" font-size="28" font-weight="bold" fill="#f97316" text-anchor="middle">UNIT IV</text>
  <text x="400" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f9fafc" text-anchor="middle">Packages, Exception Handling &amp; I/O</text>
  
  <!-- Packages Card -->
  <rect x="40" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#ea580c" stroke-width="2" stroke-opacity="0.8"/>
  <text x="150" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Packages &amp; API</text>
  <line x1="70" y1="170" x2="230" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="70" y="200" font-family="sans-serif" font-size="14" fill="#fdba74" font-weight="bold">User-defined</text>
  <text x="70" y="220" font-family="monospace" font-size="12" fill="#fbbf24">package mypack;</text>
  <text x="70" y="250" font-family="sans-serif" font-size="14" fill="#fdba74" font-weight="bold">Built-in Packages</text>
  <text x="70" y="270" font-family="monospace" font-size="12" fill="#38bdf8">java.lang, java.util</text>
  <text x="70" y="300" font-family="sans-serif" font-size="14" fill="#fdba74" font-weight="bold">Utility Classes</text>
  <text x="70" y="320" font-family="monospace" font-size="12" fill="#fbbf24">Math, Random, LocalDate</text>

  <!-- Exception Handling Card -->
  <rect x="290" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#f43f5e" stroke-width="2" stroke-opacity="0.8"/>
  <text x="400" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Exception Framework</text>
  <line x1="320" y1="170" x2="480" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="320" y="200" font-family="sans-serif" font-size="14" fill="#fda4af" font-weight="bold">Handling block</text>
  <text x="320" y="220" font-family="monospace" font-size="12" fill="#fbbf24">try { } catch { } finally { }</text>
  <text x="320" y="255" font-family="sans-serif" font-size="14" fill="#fda4af" font-weight="bold">Checked Exceptions</text>
  <text x="320" y="275" font-family="sans-serif" font-size="12" fill="#94a3b8">Checked at compile time (IOException)</text>
  <text x="320" y="300" font-family="sans-serif" font-size="14" fill="#fda4af" font-weight="bold">Unchecked Exceptions</text>
  <text x="320" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Runtime (NullPointerException)</text>

  <!-- I/O Streams Card -->
  <rect x="540" y="120" width="220" height="230" fill="url(#cardBg)" rx="12" stroke="#fb923c" stroke-width="2" stroke-opacity="0.8"/>
  <text x="650" y="155" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Java I/O System</text>
  <line x1="570" y1="170" x2="730" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="570" y="200" font-family="sans-serif" font-size="14" fill="#fed7aa" font-weight="bold">Byte Streams</text>
  <text x="570" y="220" font-family="monospace" font-size="12" fill="#fbbf24">InputStream / OutputStream</text>
  <text x="570" y="250" font-family="sans-serif" font-size="14" fill="#fed7aa" font-weight="bold">Character Streams</text>
  <text x="570" y="270" font-family="monospace" font-size="12" fill="#fbbf24">Reader / Writer</text>
  <text x="570" y="300" font-family="sans-serif" font-size="14" fill="#fed7aa" font-weight="bold">New I/O (NIO)</text>
  <text x="570" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Path &amp; Files operations</text>
</svg>
